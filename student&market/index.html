<!DOCTYPE html>
<html>
<head>
<title>Student & Market Smart Dashboard</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
margin:0;
background:#121212;
color:#fff;
text-align:center;
}

h1{
margin-top:20px;
}

.container{
width:92%;
margin:auto;
margin-top:25px;
}

button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#2e7d32;
transform:scale(1.05);
}

.controls{
display:flex;
justify-content:center;
gap:12px;
margin:20px;
flex-wrap:wrap;
}

.searchBox{
position:relative;
}

.searchBox input{
padding:10px;
padding-left:35px;
border-radius:6px;
border:1px solid #ccc;
width:200px;
}

.searchBox span{
position:absolute;
left:10px;
top:8px;
}

select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#fff;
color:#000;
border-radius:10px;
overflow:hidden;
}

th{
background:#333;
color:white;
padding:12px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f5f5f5;
}

.hidden{
display:none;
}

.totalBox{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:#4CAF50;
}

</style>
</head>

<body>

<h1>Smart Student & Market Dashboard</h1>

<div class="switchBtns">
<button onclick="showSection('students')">Students</button>
<button onclick="showSection('products')">Market Products</button>
</div>

<div class="container">

<!-- STUDENTS -->

<div id="students">

<div class="controls">

<div class="searchBox">
<span>🔎</span>
<input id="studentSearch" placeholder="Search student">
</div>

<select id="deptFilter">
<option value="All">All Departments</option>
<option value="CSE">CSE</option>
<option value="ECE">ECE</option>
<option value="ME">ME</option>
<option value="EEE">EEE</option>
<option value="IT">IT</option>
</select>

<button onclick="sortMarks()">Sort by Marks</button>
<button onclick="showAllStudents()">Reset</button>

</div>

<table id="studentTable">
<thead>
<tr>
<th>Name</th>
<th>Age</th>
<th>Department</th>
<th>Course</th>
<th>Marks</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<!-- PRODUCTS -->

<div id="products" class="hidden">

<div class="controls">

<div class="searchBox">
<span>🔎</span>
<input id="productSearch" placeholder="Search product">
</div>

<select id="typeFilter">
<option value="All">All Types</option>
<option value="Electronics">Electronics</option>
<option value="Food">Food</option>
</select>

<button onclick="showCart()">Cart Items</button>
<button onclick="totalCart()">Total Cart</button>
<button onclick="showAllProducts()">Reset</button>

</div>

<table id="productTable">
<thead>
<tr>
<th>Product</th>
<th>Type</th>
<th>Price</th>
<th>In Cart</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="cartTotal" class="totalBox"></div>

</div>

</div>

<script>

let students=[
{name:"Arjun",age:19,dept:"CSE",course:"Machine Learning",marks:91},
{name:"Meera",age:20,dept:"ECE",course:"Embedded Systems",marks:74},
{name:"Ravi",age:21,dept:"ME",course:"Thermodynamics",marks:69},
{name:"Sanjay",age:22,dept:"IT",course:"Cloud Computing",marks:87},
{name:"Divya",age:20,dept:"CSE",course:"Artificial Intelligence",marks:93},
{name:"Kabir",age:23,dept:"EEE",course:"Power Systems",marks:71},
{name:"Isha",age:21,dept:"ECE",course:"VLSI Design",marks:79},
{name:"Manish",age:22,dept:"ME",course:"Fluid Mechanics",marks:68},
{name:"Nikita",age:20,dept:"IT",course:"Cyber Security",marks:85},
{name:"Varun",age:23,dept:"CSE",course:"Data Science",marks:96}
];

let products=[
{name:"Tablet",type:"Electronics",price:25000,inCart:true},
{name:"Smart Watch",type:"Electronics",price:8000,inCart:false},
{name:"Bluetooth Speaker",type:"Electronics",price:3500,inCart:true},
{name:"Banana",type:"Food",price:60,inCart:true},
{name:"Rice",type:"Food",price:120,inCart:false},
{name:"Butter",type:"Food",price:90,inCart:true},
{name:"Gaming Mouse",type:"Electronics",price:2200,inCart:false},
{name:"Ice Cream",type:"Food",price:150,inCart:true}
];

/* LOGIC REMAINS SAME BELOW */

function showSection(section){
document.getElementById("students").classList.add("hidden");
document.getElementById("products").classList.add("hidden");
document.getElementById(section).classList.remove("hidden");
}

function renderStudents(data){
let tbody=document.querySelector("#studentTable tbody");
tbody.innerHTML="";
data.forEach(s=>{
tbody.innerHTML+=`
<tr>
<td>${s.name}</td>
<td>${s.age}</td>
<td>${s.dept}</td>
<td>${s.course}</td>
<td>${s.marks}</td>
</tr>`;
});
}

function renderProducts(data){
let tbody=document.querySelector("#productTable tbody");
tbody.innerHTML="";
data.forEach(p=>{
tbody.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.type}</td>
<td>₹${p.price}</td>
<td>${p.inCart}</td>
</tr>`;
});
}

function showAllStudents(){
renderStudents(students);
}

function showAllProducts(){
renderProducts(products);
}

document.getElementById("studentSearch").addEventListener("keypress",function(e){
if(e.key==="Enter"){
let val=this.value.toLowerCase();
let result=students.filter(s=>s.name.toLowerCase().includes(val));
renderStudents(result);
}
});

document.getElementById("productSearch").addEventListener("keypress",function(e){
if(e.key==="Enter"){
let val=this.value.toLowerCase();
let result=products.filter(p=>p.name.toLowerCase().includes(val));
renderProducts(result);
}
});

document.getElementById("deptFilter").addEventListener("change",function(){
let dept=this.value;
if(dept==="All"){
renderStudents(students);
return;
}
let result=students.filter(s=>s.dept===dept);
renderStudents(result);
});

document.getElementById("typeFilter").addEventListener("change",function(){
let type=this.value;
if(type==="All"){
renderProducts(products);
return;
}
let result=products.filter(p=>p.type===type);
renderProducts(result);
});

function sortMarks(){
let sorted=[...students].sort((a,b)=>b.marks-a.marks);
renderStudents(sorted);
}

function showCart(){
let cart=products.filter(p=>p.inCart);
renderProducts(cart);
}

function totalCart(){
let total=products
.filter(p=>p.inCart)
.reduce((sum,p)=>sum+p.price,0);

document.getElementById("cartTotal").innerText="Total Cart Price : ₹"+total;
}

showAllStudents();

</script>

</body>
</html>
